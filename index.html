<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDX News Radar AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle at top right, #1e293b, #020617); color: #f8fafc; min-height: 100vh; font-family: 'Segoe UI', sans-serif; }
        .news-card { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s ease; }
        .news-card:hover { transform: translateY(-5px); border-color: #3b82f6; box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.3); }
        .glow-text { text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-end mb-10 border-b border-slate-700 pb-6">
            <div>
                <h1 class="text-4xl font-black tracking-tighter glow-text text-blue-400">IDX RADAR <span class="text-white text-lg font-light tracking-normal ml-2 opacity-50">v2.0</span></h1>
                <p class="text-slate-400 text-sm mt-1 uppercase tracking-widest">Powered by Gemini AI Intelligence</p>
            </div>
            <div class="text-right hidden md:block">
                <div id="update-time" class="text-[10px] text-slate-500 font-mono">LOADING SYSTEM...</div>
            </div>
        </div>
        
        <div id="news-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>

    <script>
        async function fetchNews() {
            try {
                const res = await fetch('analyzed_news.json?v=' + Date.now());
                const data = await res.json();
                const container = document.getElementById('news-container');
                document.getElementById('update-time').innerText = "LAST SYNC: " + new Date().toLocaleString();
                container.innerHTML = '';

                data.reverse().forEach(news => {
                    const score = news.score || 3;
                    const color = score >= 4 ? 'emerald' : (score <= 2 ? 'red' : 'blue');
                    
                    container.innerHTML += `
                        <div class="news-card p-6 rounded-2xl flex flex-col justify-between">
                            <div>
                                <div class="flex justify-between items-start mb-4">
                                    <span class="px-2 py-1 bg-${color}-500/10 text-${color}-400 text-[10px] font-bold rounded border border-${color}-500/20">SENTIMEN: ${score}/5</span>
                                    <span class="text-blue-400 font-bold tracking-widest text-sm">${news.ticker || 'IDX'}</span>
                                </div>
                                <h3 class="text-lg font-bold leading-snug mb-3 hover:text-blue-300 transition-colors cursor-pointer">${news.title}</h3>
                                <p class="text-slate-400 text-xs leading-relaxed mb-6 line-clamp-3">${news.summary || news.body?.substring(0, 120) + '...' || 'No summary available.'}</p>
                            </div>
                            <div class="flex justify-between items-center border-t border-slate-700/50 pt-4 mt-auto">
                                <span class="text-[10px] text-slate-500 uppercase">${news.date || 'Today'}</span>
                                <a href="${news.url}" target="_blank" class="text-[10px] font-black text-white hover:text-blue-400 transition-colors uppercase tracking-tighter">Read Article →</a>
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                document.getElementById('news-container').innerHTML = "<div class='col-span-full text-center py-20 text-slate-500'>Sistem sedang istirahat. Menunggu data baru dari AI besok pagi...</div>";
            }
        }
        fetchNews();
    </script>
</body>
</html>
