<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDX News Radar AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .card { background: #1e293b; border-radius: 12px; padding: 20px; margin-bottom: 15px; border: 1px solid #334155; transition: 0.3s; }
        .card:hover { border-color: #3b82f6; transform: translateY(-2px); }
        .score-5 { border-left: 6px solid #22c55e; }
        .score-4 { border-left: 6px solid #84cc16; }
        .score-3 { border-left: 6px solid #eab308; }
        .score-2 { border-left: 6px solid #f97316; }
        .score-1 { border-left: 6px solid #ef4444; }
        .badge { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body class="p-5 md:p-10">
    <div class="max-w-4xl mx-auto">
        <header class="mb-10 border-b border-slate-700 pb-5">
            <h1 class="text-4xl font-extrabold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">IDX News Radar AI</h1>
            <p class="text-slate-400">Analisis Sentimen Berita Saham Otomatis via Gemini AI</p>
        </header>
        
        <div id="news-container" class="space-y-4">
            <div class="text-center py-20 text-slate-500 italic">Sedang memproses data berita...</div>
        </div>
    </div>

    <script>
        async function loadNews() {
            try {
                // Mengambil data dari file JSON yang ada di Github kamu
                const response = await fetch('analyzed_news.json');
                const data = await response.json();
                const container = document.getElementById('news-container');
                container.innerHTML = '';

                if (data.length === 0) {
                    container.innerHTML = '<p class="text-center text-slate-500">Belum ada berita yang dianalisis.</p>';
                    return;
                }
