<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDX News Radar AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-6">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-blue-400 mb-2">IDX News Radar AI</h1>
        <p class="text-slate-400 mb-8">Menampilkan berita terbaru dari bursa saham.</p>
        
        <div id="news-grid" class="space-y-4">
            <p class="text-center py-10">Memuat data...</p>
        </div>
    </div>

    <script>
        async function loadNews() {
            try {
                // Kita coba ambil analyzed_news.json dulu
                const response = await fetch('analyzed_news.json?v=' + Math.random());
                const data = await response.json();
                const container = document.getElementById('news-grid');
                container.innerHTML = '';

                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = "glass p-5 rounded-xl border-l-4 " + (item.score >= 4 ? 'border-green-500' : 'border-blue-500');
                    card.innerHTML = `
                        <div class="flex justify-between mb-2">
                            <span class="text-blue-400 font-bold">${item.ticker || item.source || 'NEWS'}</span>
                            <span class="text-xs text-slate-500">${item.date || item.scraped_at || ''}</span>
                        </div>
                        <h2 class="text-lg font-bold mb-2">${item.title}</h2>
                        <p class="text-slate-400 text-sm mb-4">${item.summary || (item.body ? item.body.substring(0, 150) + '...' : '')}</p>
                        <a href="${item.url}" target="_blank" class="text-xs text-blue-500 font-bold hover:underline">BACA SUMBER ASLI →</a>
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                document.getElementById('news-grid').innerHTML = '<p class="text-red-400">Gagal memuat data. Pastikan file analyzed_news.json sudah ada di GitHub.</p>';
            }
        }
        loadNews();
    </script>
</body>
</html>
