name: Daily Stock News Update

on:
  schedule:
    # Berjalan jam 01:30 UTC = 08:30 WIB
    - cron: '30 1 * * *'
  workflow_dispatch: # Agar Anda bisa klik tombol 'Run' manual di GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper and AI
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python main_scraper.py
          python ai_processor.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add public/analyzed_news.json
          git commit -m "Update news data [automated]" || exit 0
          git push